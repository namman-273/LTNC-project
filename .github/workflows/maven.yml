name: Java CI with Maven (Final Optimization)

on:
  push:
    branches: [ "master"]
  pull_request:
    branches: [ "master" ]

jobs:
  pipeline:
    name: Build, Checkstyle and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    # Chạy verify để quét tất cả cùng lúc (Compile + Checkstyle + Test)
    # Điều này đảm bảo toàn bộ quy trình được thực hiện đúng chuẩn Maven Lifecycle
    - name: Build and Verify Project
      run: mvn clean verify

    # Vẫn giữ Upload Report để lấy điểm Visualization (Artifact)
    - name: Upload JaCoCo Coverage Report
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ github.run_id }}
        path: target/site/jacoco/
        retention-days: 3

    # Tóm tắt kết quả chuyên nghiệp
    - name: Workflow Summary
      if: always()
      run: |
        echo "### Dự án: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "📊 Báo cáo Checkstyle và JaCoCo đã sẵn sàng trong phần Artifacts!" >> $GITHUB_STEP_SUMMARY